</head>
<body>
    <!-- Encabezado y menú de navegación -->
    <header>
        <div class="logo">
            <h2>Pastelitos</h2>
            <h2>Chikis</h2>
            <a><p style="font-family: Castellar;">¡LA AVENTURA COMIENZA AQUI!</p></a>
        </div>
    </header>
	<nav>
		<ul>
			<li><a href="index.html">Inicio</a></li>

			<li><as href="sugerencias.html">Sugerencias</as></li>
		</ul>
	</nav>
    <!-- Sección Sugerencias -->
    <section id="sugerencias" class="section">
        <h2 class="section-title">Envíanos tus Sugerencias</h2>
        <form class="formulario-sugerencias">
            <div class="form-group">
                <label for="nombre">Tu Nombre:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Escribe tu nombre">
            </div>
            <div class="form-group">
                <label for="correo">Tu Correo Electrónico:</label>
                <input type="email" id="correo" name="correo" required placeholder="ejemplo@dominio.com">
            </div>
            <div class="form-group">
                <label for="mensaje">Tu Sugerencia o Comentario:</label>
                <textarea id="mensaje" name="mensaje" rows="5" required placeholder="Escribe aquí tu sugerencia..."></textarea>
            </div>
            <button type="submit" class="btn btn-enviar">Enviar Sugerencia</button>
        </form>
    </section>

    <!-- Pie de página -->
